# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - dietfrontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9FB7D01F462744FA8EE9903F9ACCF794 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_25766BE5058D47F2BD65525B561DDF30 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5353E6C33D7544E3BA87B8A3664D6EEC }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dietfrontend'
          slot-name: 'Production'
          package: .
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'

      - name: Smoke check deployment
        continue-on-error: true
        run: |
          URL="https://dietfrontend.azurewebsites.net"
          echo "Checking ${URL} ..."
          for i in {1..8}; do
            code=$(curl -sSL -o response.html -w "%{http_code}" "${URL}")
            if [ "${code}" = "200" ] && grep -qi "<!doctype html" response.html; then
              echo "Smoke check passed on attempt ${i}."
              exit 0
            fi
            echo "Attempt ${i} failed (HTTP ${code}); waiting 15s before retry."
            sleep 15
          done
          echo "::warning::Smoke check did not pass after retries. Review Azure App Service logs if page is not loading."
          